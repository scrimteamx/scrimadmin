<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Shrahana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d85;
            --secondary: #a855f7;
            --bg-dark: #0f0c20;
            --bg-darker: #05040a;
            --text-main: #ffffff;
            --text-muted: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(255, 77, 133, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            transition: background 2s ease-in-out;
            cursor: none; /* Custom cursor */
        }

        body.dark-mode {
            background: var(--bg-darker);
            background-image: radial-gradient(circle at 50% 50%, #1a0b1c 0%, var(--bg-darker) 100%);
        }

        /* Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Custom Cursor Glow */
        #cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: width 0.3s, height 0.3s;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        /* Typography */
        h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            z-index: 2;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        h1.emotional {
            font-weight: 600;
            background: -webkit-linear-gradient(45deg, #ff4d85, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 0 10px rgba(255, 77, 133, 0.3));
        }

        /* Glassmorphism Buttons */
        .btn-container {
            display: flex;
            gap: 20px;
            z-index: 2;
            position: relative;
        }

        button {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-main);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px 36px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: none; /* Custom cursor */
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: var(--glow);
            transform: translateY(-2px) scale(1.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        button:hover::before {
            left: 100%;
        }

        /* Specific Buttons */
        #btn-no {
            position: relative; /* Changes to absolute dynamically */
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Animations */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake-animation {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6) !important;
            border-color: red !important;
        }

        @keyframes vibrate {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-1px, 1px); }
            50% { transform: translate(1px, -1px); }
            75% { transform: translate(-1px, -1px); }
        }

        .vibrate {
            animation: vibrate 2s linear infinite;
        }

        /* Particles */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            background: var(--text-main);
            box-shadow: 0 0 10px var(--text-main);
            z-index: 100;
        }

        /* Typewriter text styling */
        #typewriter-container {
            font-size: 1.5rem;
            line-height: 2;
            text-align: center;
            min-height: 200px;
            z-index: 2;
        }

        .line-0 { font-size: 2rem; font-weight: 700; color: var(--primary); letter-spacing: 3px; text-shadow: 0 0 20px rgba(255, 77, 133, 0.5); margin-bottom: 15px;}
        .line-1 { font-size: 1.3rem; color: var(--text-muted); }
        .line-2 { font-size: 1.3rem; color: #d8b4fe; font-style: italic; }
        .line-3 { font-size: 1.8rem; font-weight: 600; color: #ff6b9d; margin-top: 15px; text-shadow: 0 0 15px rgba(255, 107, 157, 0.4); display: inline-block;}

        .cursor-type {
            border-right: 2px solid var(--text-main);
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            button { font-size: 1rem; padding: 10px 24px; }
            .btn-container { flex-direction: column; width: 200px; }
            #btn-no.absolute-mode { width: 200px; } /* keep same width when running */
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="cursor-glow"></div>
    <audio id="bgMusic" src="look.mp3" loop></audio>

    <!-- SCREEN 1 -->
    <div id="screen1" class="screen active">
        <h1>hi shrahana</h1>
        <button id="btn-start">what?</button>
    </div>

    <!-- SCREEN 2 -->
    <div id="screen2" class="screen">
        <h1 id="s2-text">i am sorry baby!</h1>
        <div class="btn-container">
            <button id="btn-yes">its okay &lt;3</button>
            <button id="btn-no">its not okay X</button>
        </div>
    </div>

    <!-- SCREEN 3 -->
    <div id="screen3" class="screen">
        <h1 id="s3-text">really? i love you so much!</h1>
        <div id="typewriter-container"></div>
    </div>

    <script>
        // --- DOM Elements ---
        const s1 = document.getElementById('screen1');
        const s2 = document.getElementById('screen2');
        const s3 = document.getElementById('screen3');
        const btnStart = document.getElementById('btn-start');
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const s2Text = document.getElementById('s2-text');
        const s3Text = document.getElementById('s3-text');
        const typewriterContainer = document.getElementById('typewriter-container');
        const audio = document.getElementById('bgMusic');
        const cursorGlow = document.getElementById('cursor-glow');
        const body = document.body;

        // --- State Variables ---
        let noClickedOnce = false;
        let dodgeAttempts = 0;
        const maxDodges = 5;
        let isDodging = false;
        let showHeavyHearts = false;

        // --- Custom Cursor Logic ---
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        const interactiveElements = document.querySelectorAll('button');
        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursorGlow.style.width = '150px';
                cursorGlow.style.height = '150px';
                cursorGlow.style.background = 'radial-gradient(circle, rgba(255, 77, 133, 0.3) 0%, transparent 70%)';
            });
            el.addEventListener('mouseleave', () => {
                cursorGlow.style.width = '300px';
                cursorGlow.style.height = '300px';
                cursorGlow.style.background = 'radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%)';
            });
        });

        // --- Screen Transitions ---
        function switchScreen(hideScreen, showScreen) {
            hideScreen.classList.remove('active');
            setTimeout(() => {
                showScreen.classList.add('active');
            }, 1000); // Wait for fade out
        }

        // --- Screen 1 Interaction ---
        btnStart.addEventListener('click', async () => {
            // Attempt fullscreen
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                }
            } catch (err) {
                console.log("Fullscreen ignored.");
            }
            
            body.classList.add('dark-mode');
            switchScreen(s1, s2);
            initCanvas(); // Start background particles
        });

        // --- Screen 2 "No" Button Logic ---
        function moveButtonRandomly() {
            const padding = 50;
            // Get boundaries
            const maxX = window.innerWidth - btnNo.offsetWidth - padding;
            const maxY = window.innerHeight - btnNo.offsetHeight - padding;
            
            // Generate random position safely within screen
            const newX = Math.max(padding, Math.random() * maxX);
            const newY = Math.max(padding, Math.random() * maxY);

            // Change to absolute positioning smoothly
            if (!isDodging) {
                const rect = btnNo.getBoundingClientRect();
                btnNo.style.position = 'absolute';
                btnNo.style.left = rect.left + 'px';
                btnNo.style.top = rect.top + 'px';
                btnNo.classList.add('absolute-mode');
                isDodging = true;
                
                // Force reflow
                void btnNo.offsetWidth;
            }

            btnNo.style.left = newX + 'px';
            btnNo.style.top = newY + 'px';
            dodgeAttempts++;

            if (dodgeAttempts >= maxDodges) {
                destroyButton();
            }
        }

        btnNo.addEventListener('click', (e) => {
            if (!noClickedOnce) {
                noClickedOnce = true;
                s2Text.innerHTML = "REALLY? 😔<br><span style='font-size:0.6em; letter-spacing:1px;'>I AM REALLY SORRY SHRAHANA</span>";
                s2Text.classList.add('emotional');
                
                // Remove the click event so it transitions to dodge behavior
                return;
            }
        });

        // Dodge logic
        const triggerDodge = (e) => {
            if (noClickedOnce && dodgeAttempts < maxDodges) {
                e.preventDefault();
                moveButtonRandomly();
            }
        };

        btnNo.addEventListener('mouseenter', triggerDodge);
        btnNo.addEventListener('touchstart', triggerDodge, {passive: false});

        function destroyButton() {
            // Remove listeners
            btnNo.removeEventListener('mouseenter', triggerDodge);
            btnNo.removeEventListener('touchstart', triggerDodge);
            
            // Shake
            btnNo.classList.add('shake-animation');
            
            setTimeout(() => {
                createExplosion(btnNo);
                btnNo.style.display = 'none';
            }, 600); // After shake finishes
        }

        function createExplosion(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const colors = ['#ff4d85', '#a855f7', '#ffffff', '#ff6b9d'];

            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                
                document.body.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 150;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 800 + Math.random() * 400,
                    easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
                    fill: 'forwards'
                });

                setTimeout(() => particle.remove(), 1200);
            }
        }

        // --- Screen 2 "Yes" Button Logic ---
        btnYes.addEventListener('click', () => {
            switchScreen(s2, s3);
            playAudioWithFade();
            showHeavyHearts = true; // Intensify background
            
            setTimeout(() => {
                s3Text.style.opacity = '0';
                setTimeout(() => {
                    s3Text.style.display = 'none';
                    startTypewriter();
                }, 1000);
            }, 5000); // Display initial text for 5 seconds
        });

        function playAudioWithFade() {
            audio.volume = 0;
            audio.play().catch(() => console.log("Audio autoplay blocked by browser."));
            
            let vol = 0;
            const fadeInterval = setInterval(() => {
                if (vol < 0.5) { // Max volume 0.5 for pleasant bg music
                    vol += 0.05;
                    audio.volume = Math.min(vol, 0.5);
                } else {
                    clearInterval(fadeInterval);
                }
            }, 200);
        }

        // --- Typewriter Effect ---
        const lines = [
            "SHRAHANA AND SRIYASH FOREVER",
            "you mean everything to me",
            "i will do better, i promise",
            "i love you endlessly ❤️"
        ];

        async function startTypewriter() {
            for (let i = 0; i < lines.length; i++) {
                const lineDiv = document.createElement('div');
                lineDiv.className = `line-${i}`;
                typewriterContainer.appendChild(lineDiv);
                
                if(i === 3) {
                    lineDiv.classList.add('vibrate'); // Add vibration to last emotional line
                }

                await typeText(lineDiv, lines[i], 80);
                await sleep(800); // Pause between lines
            }
        }

        function typeText(element, text, speed) {
            return new Promise(resolve => {
                let i = 0;
                element.innerHTML = '<span class="text-content"></span><span class="cursor-type"></span>';
                const textSpan = element.querySelector('.text-content');
                const cursor = element.querySelector('.cursor-type');

                function type() {
                    if (i < text.length) {
                        textSpan.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(type, speed + (Math.random() * 40)); // Randomize typing speed slightly
                    } else {
                        cursor.style.display = 'none';
                        resolve();
                    }
                }
                type();
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // --- Canvas Background Animation ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class BackgroundParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * height; // Initial random spawn
            }

            reset() {
                this.x = Math.random() * width;
                this.y = height + 50;
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 1 + 0.2;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.isHeart = Math.random() > 0.7; // 30% chance to be a heart initially
                this.sway = Math.random() * Math.PI * 2;
                this.swaySpeed = Math.random() * 0.02 + 0.01;
                
                if(showHeavyHearts && Math.random() > 0.3) {
                    this.isHeart = true;
                    this.opacity = Math.random() * 0.6 + 0.2;
                    this.size = Math.random() * 15 + 5;
                    this.speed = Math.random() * 2 + 0.5;
                }
            }

            update() {
                this.y -= this.speed;
                this.sway += this.swaySpeed;
                this.x += Math.sin(this.sway) * 0.5;

                if (this.y < -50) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                
                if (this.isHeart) {
                    // Draw soft glow heart
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(255, 77, 133, 0.8)';
                    ctx.fillStyle = '#ff4d85';
                    ctx.beginPath();
                    const s = this.size / 15;
                    ctx.scale(s, s);
                    // Heart path
                    ctx.moveTo(0, 5);
                    ctx.bezierCurveTo(0, 0, -5, -5, -10, -5);
                    ctx.bezierCurveTo(-20, -5, -20, 10, -20, 10);
                    ctx.bezierCurveTo(-20, 20, 0, 30, 0, 35);
                    ctx.bezierCurveTo(0, 30, 20, 20, 20, 10);
                    ctx.bezierCurveTo(20, 10, 20, -5, 10, -5);
                    ctx.bezierCurveTo(5, -5, 0, 0, 0, 5);
                    ctx.fill();
                } else {
                    // Draw soft orb
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#a855f7';
                    ctx.fillStyle = '#e2e8f0';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function initCanvas() {
            particles = [];
            const particleCount = window.innerWidth < 768 ? 30 : 60;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new BackgroundParticle());
            }
            animateCanvas();
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            
            // Add subtle trailing effect
            ctx.fillStyle = 'rgba(5, 4, 10, 0.2)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateCanvas);
        }
    </script>
</body>
</html>
