<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Rianna!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           BASE VARIABLES & RESETS
        ========================================= */
        :root {
            --ios-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth-ease: cubic-bezier(0.25, 1, 0.5, 1);
            --kitty-url: url('https://www.citypng.com/public/uploads/preview/cute-hello-kitty-face-sanrio-kitty-hd-transparent-png-735811696610249jwuhmkcufs.png?v=2026041702');
            --pink-glow: rgba(255, 154, 158, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: none !important; /* Global custom cursor */
        }

        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
        }

        /* =========================================
           GLOBAL MICRO-INTERACTIONS
        ========================================= */
        .custom-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 20px; height: 20px;
            background: rgba(255, 182, 193, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate3d(-50%, -50%, 0);
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.8), inset 0 0 5px rgba(255, 255, 255, 0.8);
            transition: width 0.2s var(--smooth-ease), height 0.2s var(--smooth-ease), background-color 0.2s;
        }
        .custom-cursor.clicking {
            width: 12px; height: 12px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(255, 20, 147, 1);
        }
        
        .hover-scale {
            transition: transform 0.3s var(--ios-spring), box-shadow 0.3s var(--smooth-ease);
        }
        .hover-scale:hover {
            transform: scale(1.05);
        }

        .global-heart-burst {
            position: absolute;
            pointer-events: none;
            font-size: 14px;
            z-index: 99998;
            animation: floatUpFade 0.6s var(--smooth-ease) forwards;
            filter: drop-shadow(0 2px 5px rgba(255,20,147,0.5));
        }

        @keyframes floatUpFade {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -150%) scale(1.5); opacity: 0; }
        }

        /* =========================================
           GLOBAL LAYOUT & TRANSITIONS
        ========================================= */
        section {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            transition: opacity 1s var(--smooth-ease), transform 1s var(--smooth-ease);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        section.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            z-index: 10;
        }

        /* =========================================
           SECTION 1: INTRO
        ========================================= */
        #s1 { background: #050505; }
        .intro-bg-blobs { position: absolute; inset: 0; z-index: -1; overflow: hidden; background: #000; }
        .intro-bg-blobs::before, .intro-bg-blobs::after {
            content: ''; position: absolute; width: 60vw; height: 60vw; border-radius: 50%; filter: blur(120px);
            opacity: 0.4; animation: blobShift 15s infinite alternate ease-in-out;
        }
        .intro-bg-blobs::before { background: #ff66b2; top: -20%; left: -10%; }
        .intro-bg-blobs::after { background: #8a2be2; bottom: -20%; right: -10%; animation-duration: 20s; animation-direction: alternate-reverse; }
        @keyframes blobShift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 10%) scale(1.2); }
            100% { transform: translate(-10%, -10%) scale(0.9); }
        }

        .title-text {
            font-size: clamp(3rem, 8vw, 6rem); font-weight: 900;
            background: linear-gradient(135deg, #fff, #ffb6c1); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px var(--pink-glow); animation: fadeInScale 2s var(--smooth-ease) forwards; opacity: 0; transform: scale(0.8); z-index: 2;
        }
        @keyframes fadeInScale { to { opacity: 1; transform: scale(1); } }

        .tooltip {
            position: absolute; bottom: 10%; font-size: 1.2rem; font-weight: 600; letter-spacing: 2px;
            color: rgba(255,255,255,0.7); animation: blink 2s infinite ease-in-out; z-index: 2;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .corner-sticker-wrapper { position: absolute; width: 100px; height: 100px; z-index: 5; transition: transform 0.1s linear; }
        .tl { top: 5%; left: 5%; } .tr { top: 5%; right: 5%; } .bl { bottom: 5%; left: 5%; } .br { bottom: 5%; right: 5%; }
        .sticker-img { width: 100%; height: 100%; background-image: var(--kitty-url); background-size: contain; background-repeat: no-repeat; background-position: center; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); animation: floatSticker 4s ease-in-out infinite; }
        .tl .sticker-img { animation-delay: 0s; } .tr .sticker-img { animation-delay: -1s; } .bl .sticker-img { animation-delay: -2s; } .br .sticker-img { animation-delay: -3s; }
        @keyframes floatSticker { 0%, 100% { transform: translateY(0) rotate(0deg); } 33% { transform: translateY(-15px) rotate(5deg); } 66% { transform: translateY(10px) rotate(-5deg); } }

        .mini-sticker { position: absolute; width: 40px; height: 40px; background-image: var(--kitty-url); background-size: contain; background-repeat: no-repeat; pointer-events: none; z-index: 6; transition: transform 1.5s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 1.5s ease-out; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }

        /* =========================================
           SECTION 2: GAME
        ========================================= */
        #s2 { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%); }

        .score-display {
            position: absolute; top: 5%; font-size: 3rem; font-weight: 900; color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px var(--pink-glow); padding: 10px 30px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 1.5s var(--smooth-ease); z-index: 10;
        }

        .score-display.win-state {
            top: 50%; transform: translateY(-50%) scale(2.5); background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 100px var(--pink-glow), 0 8px 32px rgba(0, 0, 0, 0.2); animation: winPulse 1.5s infinite alternate;
        }
        @keyframes winPulse { 0% { transform: translateY(-50%) scale(2.5); text-shadow: 0 0 20px #fff; } 100% { transform: translateY(-50%) scale(2.7); text-shadow: 0 0 50px #fff, 0 0 80px #ff69b4; } }

        .target-kitty { position: absolute; width: 80px; height: 80px; background-image: var(--kitty-url); background-size: contain; background-repeat: no-repeat; z-index: 5; animation: targetIn 0.4s var(--ios-spring) forwards, targetFloat 3s ease-in-out infinite; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2)); transform-origin: center; }
        @keyframes targetIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes targetFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .particle { position: absolute; pointer-events: none; font-size: 20px; z-index: 7; animation: particleAnim 0.8s ease-out forwards; }
        @keyframes particleAnim { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }

        /* =========================================
           SECTION 3: CELEBRATION
        ========================================= */
        #s3 { background: radial-gradient(circle at center, #ffd1ff 0%, #fadbff 40%, #e6e6fa 100%); }
        .s3-bg-elements { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .drift-item { position: absolute; opacity: 0.6; animation: driftUp linear infinite; }
        @keyframes driftUp { from { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } to { transform: translateY(-20vh) rotate(360deg); opacity: 0; } }

        #msg-container { position: relative; width: 90%; max-width: 1000px; height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .msg-item { position: absolute; width: 100%; text-align: center; font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; color: #fff; text-shadow: 0 4px 20px rgba(255, 105, 180, 0.8), 0 0 10px rgba(255, 255, 255, 0.5); opacity: 0; transform: translateY(40px); transition: all 0.8s var(--ios-spring); }
        .msg-item.show { opacity: 1; transform: translateY(0); }
        .msg-item.hide { opacity: 0; transform: translateY(-40px); }
        .live-value { color: #ff1493; text-shadow: 0 0 15px rgba(255, 20, 147, 0.4), 2px 2px 0px #fff; display: inline-block; font-variant-numeric: tabular-nums; }

        .btn-continue {
            margin-top: auto; padding: 15px 40px; font-size: 1.5rem; font-family: inherit; font-weight: 800;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px); border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50px; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.2); box-shadow: 0 10px 30px rgba(255, 20, 147, 0.3);
            opacity: 0; transform: translateY(20px); transition: all 0.5s var(--ios-spring); pointer-events: none;
        }
        .btn-continue.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .btn-continue:hover { background: rgba(255, 255, 255, 0.5); box-shadow: 0 10px 40px rgba(255, 20, 147, 0.5); }

        /* =========================================
           SECTION 4: MEMORY VAULT
        ========================================= */
        #s4 { background: linear-gradient(120deg, #fccb90 0%, #d57eeb 100%); }
        
        /* Floating particles for Vault */
        .vault-particles { position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.3; animation: parallaxPan 20s linear infinite; pointer-events: none; }
        @keyframes parallaxPan { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }

        .vault-cover {
            font-size: 3rem; font-weight: 900; padding: 30px 60px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.2);
            text-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: all 0.8s var(--ios-spring); z-index: 10;
        }
        .vault-cover.opened { opacity: 0; transform: scale(1.5) translateY(-50px) rotateX(20deg); pointer-events: none; }

        .carousel-wrapper {
            position: absolute; width: 100vw; height: 100vh; display: flex; align-items: center;
            overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; scroll-behavior: smooth;
            padding: 0 50vw; /* Center padding */
            opacity: 0; pointer-events: none; transform: scale(0.8); transition: all 1s var(--ios-spring); z-index: 5;
        }
        .carousel-wrapper.show { opacity: 1; pointer-events: auto; transform: scale(1); }
        .carousel-wrapper::-webkit-scrollbar { display: none; }

        .memory-card {
            flex: 0 0 auto; width: 300px; height: 400px; margin: 0 20px; scroll-snap-align: center;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.5);
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: transform 0.1s; transform-style: preserve-3d;
            perspective: 1000px;
        }
        
        .memory-img {
            width: 100%; flex: 1; border-radius: 15px; 
            background-color: #ffb6c1; /* Fallback color */
            background-image: linear-gradient(45deg, #ff9a9e, #fecfef); /* Default placeholder gradient */
            background-size: cover; background-position: center; background-repeat: no-repeat;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; justify-content: center; align-items: center;
            font-size: 4rem; transform: translateZ(30px);
        }
        
        .memory-caption {
            font-size: 1.2rem; font-weight: 800; text-align: center; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            transform: translateZ(40px); padding-bottom: 10px;
        }
        
        .btn-to-secret { position: absolute; bottom: 5%; padding: 15px 40px; border-radius: 50px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); color: white; font-weight: bold; border: 1px solid rgba(255,255,255,0.3); opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 20;}
        .carousel-wrapper.show ~ .btn-to-secret { opacity: 1; pointer-events: auto; }

        /* =========================================
           SECTION 5: SECRET MESSAGE
        ========================================= */
        #s5 { background: #111; transition: background 2s ease; }
        #s5.unlocked { background: radial-gradient(circle at center, #2b102b 0%, #000 100%); }

        .lock-container {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 30px;
            padding: 50px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.5s var(--ios-spring); z-index: 5;
        }
        .lock-container.hide { opacity: 0; transform: scale(0.8) translateY(-50px); pointer-events: none; }
        
        .lock-icon { font-size: 5rem; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); transition: all 0.5s; }
        .lock-prompt { font-size: 1.2rem; margin-bottom: 30px; color: #aaa; text-align: center; }
        
        .ios-input {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px;
            padding: 15px 20px; font-size: 1.5rem; color: #fff; text-align: center; font-family: inherit;
            width: 100%; max-width: 300px; outline: none; transition: border-color 0.3s, box-shadow 0.3s;
            pointer-events: auto; /* Ensure clickable over custom cursor logic */
        }
        .ios-input:focus { border-color: #ff69b4; box-shadow: 0 0 15px rgba(255,105,180,0.5); }
        .ios-input.error { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border-color: #ff4444; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .secret-reveal-wrapper {
            position: absolute; width: 90%; max-width: 800px; padding: 40px;
            font-size: clamp(1.2rem, 3vw, 2rem); line-height: 1.8; font-weight: 600;
            text-align: center; color: #fff; text-shadow: 0 0 10px rgba(255,105,180,0.5);
            opacity: 0; pointer-events: none; transition: opacity 1s ease; z-index: 10;
        }
        .secret-reveal-wrapper.show { opacity: 1; }
        .typewriter-word { opacity: 0; display: inline-block; margin-right: 8px; transition: opacity 0.5s ease; filter: blur(4px); }
        .typewriter-word.visible { opacity: 1; filter: blur(0); }

    </style>
</head>
<body>

    <!-- GLOBAL AUDIO -->
    <audio id="bdayAudio" src="best.mp3" preload="auto" loop></audio>
    <div class="custom-cursor" id="cursor"></div>

    <div id="app">
        <!-- SECTION 1: INTRO -->
        <section id="s1" class="active">
            <div class="intro-bg-blobs"></div>
            <div class="corner-sticker-wrapper tl parallax-el" data-speed="1.2" onclick="spawnKitties(event)"><div class="sticker-img hover-scale"></div></div>
            <div class="corner-sticker-wrapper tr parallax-el" data-speed="0.8" onclick="spawnKitties(event)"><div class="sticker-img hover-scale"></div></div>
            <div class="corner-sticker-wrapper bl parallax-el" data-speed="1.5" onclick="spawnKitties(event)"><div class="sticker-img hover-scale"></div></div>
            <div class="corner-sticker-wrapper br parallax-el" data-speed="1.1" onclick="spawnKitties(event)"><div class="sticker-img hover-scale"></div></div>
            <h1 class="title-text parallax-el hover-scale" data-speed="0.5">hello rianna!</h1>
            <div class="tooltip">Press ENTER to continue</div>
        </section>

        <!-- SECTION 2: TARGET GAME -->
        <section id="s2">
            <div id="scoreDisplay" class="score-display">0/16</div>
            <div id="game-area" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2;"></div>
        </section>

        <!-- SECTION 3: CELEBRATION -->
        <section id="s3">
            <div class="s3-bg-elements" id="s3-bg"></div>
            <div id="msg-container"></div>
            <button class="btn-continue hover-scale" id="btn-to-vault">Open the Vault ✨</button>
        </section>

        <!-- SECTION 4: MEMORY VAULT -->
        <section id="s4">
            <div class="vault-particles"></div>
            <div class="vault-cover hover-scale" id="vault-cover">Open Memories 💌</div>
            
            <div class="carousel-wrapper" id="carousel">
                <!-- Cards generated via JS -->
            </div>
            <button class="btn-continue hover-scale btn-to-secret" id="btn-to-secret">Unlock Final Secret 🔒</button>
        </section>

        <!-- SECTION 5: SECRET MESSAGE -->
        <section id="s5">
            <div class="lock-container" id="lock-box">
                <div class="lock-icon" id="lock-icon">🔒</div>
                <div class="lock-prompt">A message for you… but you need a key 👀</div>
                <input type="password" id="secret-input" class="ios-input" placeholder="Enter key..." autocomplete="off">
            </div>
            
            <div class="secret-reveal-wrapper" id="secret-text">
                <!-- Typewriter injected here -->
            </div>
        </section>
    </div>

    <script>
        // ==========================================
        // SYSTEM CONTROLS, AUDIO & MICRO-INTERACTIONS
        // ==========================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const globalAudio = document.getElementById('bdayAudio');
        globalAudio.volume = 0; // Start at 0 for fade-in

        function startGlobalAudio() {
            globalAudio.play().then(() => {
                let vol = 0;
                let fadeInt = setInterval(() => {
                    vol += 0.02; // gradual fade
                    if(vol >= 0.3) { // soft volume cap
                        vol = 0.3;
                        clearInterval(fadeInt);
                    }
                    globalAudio.volume = vol;
                }, 100);
            }).catch(e => console.log("Audio play prevented:", e));
        }

        // Web Audio Synth for clicks/swipes
        function playSynthSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if(type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'swipe') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // Custom Cursor & Global Parallax
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            
            const x = (e.clientX / window.innerWidth - 0.5) * 30; 
            const y = (e.clientY / window.innerHeight - 0.5) * 30;
            document.querySelectorAll('.parallax-el').forEach(el => {
                const speed = el.getAttribute('data-speed') || 1;
                el.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });

        document.addEventListener('mousedown', (e) => {
            cursor.classList.add('clicking');
            // Global ripple / tiny heart
            const heart = document.createElement('div');
            heart.className = 'global-heart-burst';
            heart.innerText = ['💖', '✨'][Math.floor(Math.random() * 2)];
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 600);
        });
        document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));

        // ==========================================
        // SECTION 1 LOGIC
        // ==========================================
        function spawnKitties(e) {
            playSynthSound('pop');
            const rect = e.currentTarget.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for(let i=0; i<2; i++) {
                const img = document.createElement('div');
                img.className = 'mini-sticker';
                img.style.left = (startX - 20) + 'px';
                img.style.top = (startY - 20) + 'px';
                document.body.appendChild(img);
                img.getBoundingClientRect(); // reflow
                const angle = Math.random() * Math.PI * 2;
                const dist = 80 + Math.random() * 100;
                img.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(1.5)`;
                img.style.opacity = '0';
                setTimeout(() => img.remove(), 1500);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.getElementById('s1').classList.contains('active')) {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                document.getElementById('s1').classList.remove('active');
                document.getElementById('s2').classList.add('active');
                setTimeout(startGame, 800);
            }
        });

        // ==========================================
        // SECTION 2: GAME LOGIC
        // ==========================================
        let gameActive = false, score = 0, spawnInterval;
        const gameArea = document.getElementById('game-area');
        const scoreUI = document.getElementById('scoreDisplay');

        function startGame() {
            gameActive = true; score = 0; scoreUI.innerText = "0/16";
            spawnInterval = setInterval(spawnTarget, 700);
        }

        function spawnTarget() {
            if (!gameActive) return;
            const target = document.createElement('div');
            target.className = 'target-kitty hover-scale';
            const maxW = window.innerWidth - 100; const maxH = window.innerHeight - 150;
            target.style.left = Math.max(20, Math.random() * maxW) + 'px';
            target.style.top = Math.max(100, Math.random() * maxH) + 'px';
            target.onmousedown = (e) => hitTarget(e, target);
            target.ontouchstart = (e) => { e.preventDefault(); hitTarget(e.touches[0], target); };
            gameArea.appendChild(target);
            setTimeout(() => {
                if (target.parentNode) {
                    target.style.opacity = '0'; target.style.transform = 'scale(0)';
                    setTimeout(() => target.remove(), 300);
                }
            }, 2000);
        }

        function createParticles(x, y) {
            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div'); p.className = 'particle';
                p.innerText = ['💖', '✨', '💕'][Math.floor(Math.random() * 3)];
                p.style.left = (x - 10) + 'px'; p.style.top = (y - 10) + 'px';
                const angle = Math.random() * Math.PI * 2; const dist = 40 + Math.random() * 60;
                p.style.setProperty('--tx', `${Math.cos(angle) * dist}px`); p.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
                gameArea.appendChild(p); setTimeout(() => p.remove(), 800);
            }
        }

        function hitTarget(e, target) {
            if (!gameActive) return;
            playSynthSound('pop'); createParticles(e.clientX, e.clientY); target.remove();
            score++; scoreUI.innerText = `${score}/16`;
            scoreUI.style.transform = 'scale(1.2)';
            setTimeout(() => { if(score < 16) scoreUI.style.transform = 'scale(1)'; }, 150);
            if (score === 16) winGame();
        }

        function winGame() {
            gameActive = false; clearInterval(spawnInterval);
            document.querySelectorAll('.target-kitty').forEach(el => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); });
            setTimeout(() => {
                scoreUI.classList.add('win-state'); scoreUI.innerText = "16!";
                
                // CRITICAL AUDIO CHANGE: Start global audio here seamlessly
                startGlobalAudio();

                setTimeout(() => {
                    document.getElementById('s2').classList.remove('active');
                    document.getElementById('s3').classList.add('active');
                    startCelebration();
                }, 5000);
            }, 500);
        }

        // ==========================================
        // SECTION 3: CELEBRATION LOGIC
        // ==========================================
        const bdayDate = new Date('2010-04-18T00:00:00');
        const msgs = [
            "HAPPY BIRTHDAY RIANNA", "YOU ARE OFFICIALLY 16 🥹",
            "YOU ARE NOW OFFICIALLY <br><span class='live-value' id='val-days'></span> days old,",
            "<span class='live-value' id='val-hours'></span> hours old,",
            "<span class='live-value' id='val-mins'></span> minutes old,",
            "<span class='live-value' id='val-secs'></span> seconds old. 🥹",
            "Happy birthday hg", "Happy birthday queen", "Happy birthday bes2",
            "HAPPY BIRTHDAY RIANNA, RHINO, PIANO, BHATEY, BHATUWA, RIRU 🥹🥹"
        ];
        let msgIndex = 0; let currentDomMsg = null;

        function startCelebration() {
            createBackgroundElements(); requestAnimationFrame(updateLiveTime); showNextMessage();
        }

        function showNextMessage() {
            const container = document.getElementById('msg-container');
            if (currentDomMsg) {
                currentDomMsg.classList.remove('show'); currentDomMsg.classList.add('hide');
                setTimeout((el) => el.remove(), 800, currentDomMsg);
            }

            if (msgIndex >= msgs.length) {
                // End of messages, show button to next section
                setTimeout(() => document.getElementById('btn-to-vault').classList.add('show'), 500);
                return; 
            }

            const div = document.createElement('div');
            div.className = 'msg-item'; div.innerHTML = msgs[msgIndex];
            container.appendChild(div); currentDomMsg = div;

            requestAnimationFrame(() => { setTimeout(() => div.classList.add('show'), 50); });
            msgIndex++;
            setTimeout(showNextMessage, 3000);
        }

        function updateLiveTime() {
            const now = new Date(); const diff = now - bdayDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const mins = Math.floor(diff / (1000 * 60));
            const secs = Math.floor(diff / 1000);

            const elDays = document.getElementById('val-days'); const elHours = document.getElementById('val-hours');
            const elMins = document.getElementById('val-mins'); const elSecs = document.getElementById('val-secs');

            if(elDays) elDays.innerText = days.toLocaleString(); if(elHours) elHours.innerText = hours.toLocaleString();
            if(elMins) elMins.innerText = mins.toLocaleString(); if(elSecs) elSecs.innerText = secs.toLocaleString();
            if(document.getElementById('s3').classList.contains('active')) requestAnimationFrame(updateLiveTime);
        }

        function createBackgroundElements() {
            const bgContainer = document.getElementById('s3-bg'); const items = ['💖', '✨', '🎀'];
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const el = document.createElement('div'); el.className = 'drift-item';
                    if(Math.random() > 0.5) {
                        el.innerText = items[Math.floor(Math.random() * items.length)]; el.style.fontSize = (20 + Math.random() * 30) + 'px';
                    } else {
                        el.style.backgroundImage = 'var(--kitty-url)'; el.style.backgroundSize = 'contain';
                        el.style.width = el.style.height = (30 + Math.random() * 40) + 'px';
                    }
                    el.style.left = Math.random() * 100 + 'vw'; el.style.animationDuration = (10 + Math.random() * 15) + 's';
                    bgContainer.appendChild(el);
                }, i * 400);
            }
        }

        // Section 3 to Section 4
        document.getElementById('btn-to-vault').addEventListener('click', () => {
            playSynthSound('swipe');
            document.getElementById('s3').classList.remove('active');
            document.getElementById('s4').classList.add('active');
        });

        // ==========================================
        // SECTION 4: MEMORY VAULT LOGIC
        // ==========================================
        const vaultCover = document.getElementById('vault-cover');
        const carousel = document.getElementById('carousel');
        
        // --- ADD YOUR IMAGE URLS HERE ---
        // Replace the placeholder URLs inside the single quotes with the links to your photos.
        const memories = [
            { image: 'first.jpg', caption: "First of many core memories" },
            { image: 'second.jpg', caption: "Remember this day? 🥹" },
            { image: 'third.jpg', caption: "Looking completely iconic" },
            { image: 'fourth.jpg', caption: "Best duo to ever exist" },
            { image: 'last.jpg', caption: "Ate and left absolutely no crumbs" }
        ];

        // Generate Cards
        memories.forEach(mem => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            // Notice we use the image URL for the background style here
            card.innerHTML = `
                <div class="memory-img" style="background-image: url('${mem.image}');"></div>
                <div class="memory-caption">${mem.caption}</div>
            `;
            // 3D Hover Tilt
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const xc = rect.width/2; const yc = rect.height/2;
                const dx = x - xc; const dy = y - yc;
                card.style.transform = `rotateY(${dx/15}deg) rotateX(${-dy/15}deg) scale3d(1.05, 1.05, 1.05)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `rotateY(0) rotateX(0) scale3d(1, 1, 1)`;
            });
            carousel.appendChild(card);
        });

        vaultCover.addEventListener('click', () => {
            playSynthSound('pop');
            vaultCover.classList.add('opened');
            setTimeout(() => {
                carousel.classList.add('show');
            }, 300);
        });

        carousel.addEventListener('scroll', () => {
            // Optional: debounce sound to play on snap
            // For now, let native smooth scrolling handle the feel
        }, { passive: true });

        // Section 4 to Section 5
        document.getElementById('btn-to-secret').addEventListener('click', () => {
            playSynthSound('swipe');
            document.getElementById('s4').classList.remove('active');
            document.getElementById('s5').classList.add('active');
            setTimeout(() => document.getElementById('secret-input').focus(), 1000);
        });

        // ==========================================
        // SECTION 5: SECRET MESSAGE LOGIC
        // ==========================================
        const secretInput = document.getElementById('secret-input');
        const lockBox = document.getElementById('lock-box');
        const lockIcon = document.getElementById('lock-icon');
        const s5 = document.getElementById('s5');
        const revealWrapper = document.getElementById('secret-text');

        const secretParagraph = "Rianna, happy sweet 16! 🥹 You are such an incredible light in this world. Thank you for always being you—so genuine, funny, and beautiful inside and out. Here is to making countless more memories, laughing until we cry, and growing up together. I appreciate you more than words can say. Have the best birthday ever! 💖✨🎀";

        secretInput.addEventListener('input', (e) => {
            const val = e.target.value.trim().toLowerCase();
            if (val === 'rianna16') {
                unlockSecret();
            } else if (val.length >= 8) {
                // Wrong guess effect
                secretInput.classList.add('error');
                playSynthSound('pop'); // double as error thud
                setTimeout(() => secretInput.classList.remove('error'), 400);
            }
        });

        function unlockSecret() {
            secretInput.blur();
            playSynthSound('swipe');
            lockIcon.innerText = '🔓';
            lockIcon.style.transform = 'scale(1.3)';
            s5.classList.add('unlocked');
            
            setTimeout(() => {
                lockBox.classList.add('hide');
                setTimeout(startTypewriter, 500);
            }, 800);
        }

        function startTypewriter() {
            revealWrapper.classList.add('show');
            const words = secretParagraph.split(' ');
            
            words.forEach((word, index) => {
                const span = document.createElement('span');
                span.className = 'typewriter-word';
                span.innerText = word + ' ';
                revealWrapper.appendChild(span);
                
                // Word-by-word reveal
                setTimeout(() => {
                    span.classList.add('visible');
                }, index * 250); // 250ms delay per word
            });
        }
    </script>
</body>
</html>
